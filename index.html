<CUIDA_MAIS_UFSM html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema - Cuida Mais APS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: url('image_2.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
        }

        /* Espaçador superior invisível para manter a caixinha centralizada perfeitamente */
        body::before {
            content: "";
            flex-grow: 1;
        }

        /* Container do formulário de login */
        .login-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 800px;
            position: relative;
            overflow: hidden;
            border-top: 6px solid #006680;
            display: flex;
            flex-grow: 0;
            margin-bottom: 20px;
        }

        /* Barra decorativa colorida no topo da caixa */
        .color-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            display: flex;
            z-index: 10;
        }
        .color-bar div { height: 100%; flex: 1; }
        .color-1 { background-color: #5cb8b2; }
        .color-2 { background-color: #f7bd43; }
        .color-3 { background-color: #bd82b5; }
        .color-4 { background-color: #8cc577; }
        .color-5 { background-color: #ea7451; }

        /* Coluna do Logotipo */
        .logo-section {
            flex: 1;
            padding: 60px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8fbfc;
            border-right: 1px solid #e1ebef;
        }
        .logo-section img {
            max-width: 100%;
            height: auto;
            max-height: 250px;
        }

        /* Coluna do Formulário */
        .form-section {
            flex: 1;
            padding: 60px 40px;
        }

        h2 {
            text-align: center;
            margin: 0 0 28px 0;
            color: #003344;
            font-size: 26px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #445566;
            font-size: 14px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #cfdbe5;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            color: #333;
        }

        .input-group input:focus {
            border-color: #f7bd43;
            box-shadow: 0 0 0 4px rgba(247, 189, 67, 0.2);
        }

        /* Estilização da Caixa de Seleção (Remember username) */
        .remember-group {
            display: flex;
            align-items: center;
            margin-bottom: 22px;
            cursor: pointer;
            user-select: none;
        }

        .remember-group input {
            margin-right: 10px;
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #005570; /* Cor do checkbox combinando com o botão */
        }

        .remember-group label {
            color: #445566;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #005570;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(0, 85, 112, 0.2);
        }

        button:hover {
            background-color: #003344;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .footer-links {
            text-align: center;
            margin-top: 20px;
        }
        .footer-links a {
            color: #006680;
            font-size: 13px;
            text-decoration: none;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }

        /* Seção do Rodapé */
        .site-footer {
            width: 100%;
            height: 60px;
            background: url('image_4.png') no-repeat center center;
            background-size: 100% 100%;
            flex-shrink: 0;
            z-index: 100;
        }

        /* Responsividade para Celular */
        @media (max-width: 768px) {
            body {
                overflow: auto;
                height: auto;
                min-height: 100vh;
            }
            body::before { display: none; }
            
            .login-container {
                flex-direction: column;
                max-width: 420px;
                margin: 40px auto 20px auto;
            }
            .logo-section {
                padding: 50px 30px 20px 30px;
                border-right: none;
                border-bottom: 1px solid #e1ebef;
            }
            .logo-section img {
                max-height: 140px;
            }
            .form-section {
                padding: 30px 30px;
            }
            .site-footer {
                height: 40px;
                margin-top: auto;
            }
        }
    </style>
</head>
<body>

    <!-- Caixa de Login Centralizada -->
    <div class="login-container">
        <div class="color-bar">
            <div class="color-1"></div>
            <div class="color-2"></div>
            <div class="color-3"></div>
            <div class="color-4"></div>
            <div class="color-5"></div>
        </div>

        <!-- Coluna Esquerda: Logotipo -->
        <div class="logo-section">
            <img src="image_3.png" alt="Logotipo Cuida Mais APS">
        </div>

        <!-- Coluna Direita: Formulário -->
        <div class="form-section">
            
            <form id="loginForm" action="https://capacitacao.proj.ufsm.br/login/index.php" method="POST">
                <input type="hidden" id="logintoken" name="logintoken" value="">
                
                <div class="input-group">
                    <label for="usuario">Login</label> 
                    <input id="usuario" name="username" required type="text" placeholder="Usuário" />
                </div>
                <div class="input-group">
                    <label for="senha">Senha</label> 
                    <input id="senha" name="password" required type="password" placeholder="Senha" />
                </div>

                <!-- Nova Caixa de Seleção (Remember username) adicionada acima do botão -->
                <div class="remember-group">
                    <input type="checkbox" id="rememberusername" name="rememberusername" value="1">
                    <label for="rememberusername">Lembrar identificação de usuário</label>
                </div>

                <button type="submit" id="btnEnviar">Enviar</button>
            </form>

        </div>
    </div>

    <!-- Barra de Rodapé Esticada -->
    <footer class="site-footer"></footer>

    <script>
        const form = document.getElementById('loginForm');
        const btn = document.getElementById('btnEnviar');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Conectando...";

            try {
                const response = await fetch('https://capacitacao.proj.ufsm.br/login/index.php');
                const htmlText = await response.text();
                const tokenMatch = htmlText.match(/name="logintoken" value="([^"]+)"/);
                
                if (tokenMatch && tokenMatch[1]) {
                    document.getElementById('logintoken').value = tokenMatch[1];
                    form.submit();
                } else {
                    form.submit();
                }
            } catch (error) {
                form.submit();
            }
        });
    </script>

</body>
</html>
