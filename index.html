<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema - Cuida Mais APS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: url('Moodle_Fundo-Inteiro_H.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
        }

        body::before {
            content: "";
            flex-grow: 1;
        }

        .login-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 800px;
            position: relative;
            overflow: hidden;
            border-top: 6px solid #006680;
            display: flex;
            flex-grow: 0;
            margin-bottom: 20px;
        }

        .color-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            display: flex;
            z-index: 10;
        }
        .color-bar div { height: 100%; flex: 1; }
        .color-1 { background-color: #5cb8b2; }
        .color-2 { background-color: #f7bd43; }
        .color-3 { background-color: #bd82b5; }
        .color-4 { background-color: #8cc577; }
        .color-5 { background-color: #ea7451; }

        .logo-section {
            flex: 1;
            padding: 60px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8fbfc;
            border-right: 1px solid #e1ebef;
        }
        .logo-section img {
            max-width: 100%;
            height: auto;
            max-height: 250px;
        }

        .form-section {
            flex: 1;
            padding: 60px 40px;
        }

        h2 {
            text-align: center;
            margin: 0 0 28px 0;
            color: #003344;
            font-size: 26px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #445566;
            font-size: 14px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #cfdbe5;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            color: #333;
        }

        .input-group input:focus {
            border-color: #f7bd43;
            box-shadow: 0 0 0 4px rgba(247, 189, 67, 0.2);
        }

        .remember-group {
            display: flex;
            align-items: center;
            margin-bottom: 22px;
        }

        .remember-group input {
            margin-right: 10px;
            width: 16px;
            height: 16px;
            accent-color: #005570;
        }

        .remember-group label {
            color: #445566;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #005570;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #003344;
        }

        .footer-links {
            text-align: center;
            margin-top: 20px;
        }
        .footer-links a {
            color: #006680;
            font-size: 13px;
            text-decoration: none;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }

        .site-footer {
            width: 100%;
            height: 60px;
            background: url('Moodle_Fundo-Rodape_V.png') no-repeat center center;
            background-size: 100% 100%;
            flex-shrink: 0;
            z-index: 100;
        }

        @media (max-width: 768px) {
            body { overflow: auto; height: auto; min-height: 100vh; }
            body::before { display: none; }
            .login-container { flex-direction: column; max-width: 420px; margin: 40px auto 20px auto; }
            .logo-section { padding: 50px 30px 20px 30px; border-right: none; border-bottom: 1px solid #e1ebef; }
            .logo-section img { max-height: 140px; }
            .form-section { padding: 30px 30px; }
            .site-footer { height: 40px; margin-top: auto; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="color-bar">
            <div class="color-1"></div><div class="color-2"></div><div class="color-3"></div><div class="color-4"></div><div class="color-5"></div>
        </div>

        <div class="logo-section">
            <img src="Moodle_Logo.png" alt="Logotipo Cuida Mais APS">
        </div>

        <div class="form-section">
            <h2>Entrar</h2>
            
            <form action="https://capacitacao.proj.ufsm.br/login/index.php" method="POST">
                <div class="input-group">
                    <label for="usuario">Login</label> 
                    <input id="usuario" name="username" required type="text" placeholder="Digite seu usuário" />
                </div>
                <div class="input-group">
                    <label for="senha">Senha</label> 
                    <input id="senha" name="password" required type="password" placeholder="Digite sua senha" />
                </div>
                <div class="remember-group">
                    <input type="checkbox" id="rememberusername" name="rememberusername" value="1">
                    <label for="rememberusername">Lembrar identificação de usuário</label>
                </div>
                <button type="submit">Enviar</button>
            </form>

            <div class="footer-links">
                <a href="https://capacitacao.proj.ufsm.br/login/forgot_password.php" target="_blank">Esqueceu o usuário ou a senha?</a>
            </div>
        </div>
    </div>

    <footer class="site-footer"></footer>

</body>
</html>
